name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      SESSION_SECRET: test-secret-at-least-32-chars-long!!
      CRON_SECRET: test-cron-secret-at-least-32-chars!!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      # Non-blocking advisory of known CVEs in production deps (tests run locally; test files and
      # vitest config are gitignored. Native GitHub secret scanning + Dependabot alerts cover the rest
      # — enable them in Settings → Code security).
      - name: Dependency audit (advisory)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
