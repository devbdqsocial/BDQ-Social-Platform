name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      SESSION_SECRET: test-secret-at-least-32-chars-long!!
      CRON_SECRET: test-cron-secret-at-least-32-chars!!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:run
      - run: npm run build
      # Blocking gate on known CVEs in production deps (build-plan R0.1b).
      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=high

  e2e:
    # Runs only when a test database is configured (build-plan R0.1c); skips cleanly otherwise.
    name: E2E smoke
    runs-on: ubuntu-latest
    if: ${{ vars.E2E_ENABLED == 'true' }}
    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
      SESSION_SECRET: test-secret-at-least-32-chars-long!!
      CRON_SECRET: test-cron-secret-at-least-32-chars!!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
